<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>看星星！</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      overflow: hidden;
      background: #000;
      cursor: crosshair;
      font-family: "Noto Serif SC", "STSong", "SimSun", serif;
    }

    .vignette {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      background: radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.6) 100%);
    }

    #universe {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .vertical-title {
      position: fixed;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      writing-mode: vertical-rl;
      text-orientation: upright;
      letter-spacing: 0.5em;
      font-size: 2.8rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 0 30px rgba(100, 149, 237, 0.5);
      font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
      pointer-events: none;
      opacity: 0.9;
    }
    
    .vertical-title::after {
      content: "✦";
      display: block;
      margin-top: 20px;
      font-size: 1.5rem;
      opacity: 0.6;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
    }

    .back-btn {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 999;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: rgba(255,255,255,0.4);
      transform: translateX(5px);
    }

    .fixed-tips {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      background: rgba(10, 15, 30, 0.8);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(100, 149, 237, 0.3);
      border-radius: 25px;
      padding: 14px 32px;
      color: rgba(200, 210, 255, 0.95);
      font-size: 14px;
      letter-spacing: 2px;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      box-shadow: 0 5px 30px rgba(0,0,0,0.5), 0 0 20px rgba(100,149,237,0.1);
    }

    .constellation-info {
      position: fixed;
      bottom: 100px;
      left: 40px;
      z-index: 100;
      width: 320px;
      background: rgba(10, 15, 30, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 149, 237, 0.2);
      border-radius: 16px;
      padding: 20px 24px;
      color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 30px rgba(100,149,237,0.1);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .constellation-info.active {
      opacity: 1;
      transform: translateY(0);
    }

    .info-star-name {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #fff;
      letter-spacing: 0.1em;
      text-shadow: 0 2px 10px rgba(255,255,255,0.2);
    }

    .info-constellation {
      font-size: 0.85rem;
      color: #8aa4ff;
      margin-bottom: 12px;
      letter-spacing: 0.15em;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-constellation::before {
      content: "✦";
      color: rgba(255,255,255,0.5);
      font-size: 0.6rem;
    }

    .info-desc {
      font-size: 0.95rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.75);
      font-style: italic;
      border-left: 2px solid rgba(100, 149, 237, 0.3);
      padding-left: 12px;
    }

    .info-hint {
      margin-top: 12px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      text-align: right;
    }

    .meteor-shower-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
      opacity: 0;
    }

    .meteor-shower-text.show {
      opacity: 1;
      animation: showerGlow 3s ease-out forwards;
    }

    @keyframes showerGlow {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); filter: blur(10px); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
      100% { opacity: 0; transform: translate(-50%, -45%) scale(1.05); filter: blur(5px); }
    }

    .shower-title {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.5em;
      margin-bottom: 15px;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,255,255,0.8);
    }

    .shower-quote {
      font-size: 1.1rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.8);
      max-width: 400px;
      margin: 0 auto;
    }
  </style>
</head>

const starColors = [
  '#ffffff', '#fffff0', '#fff4e6', '#e6f0ff', 
  '#ffe4c4', '#ffd700', '#b0c4de', '#add8e6',
  '#e6e6fa', '#f0f8ff', '#fffacd', '#f5f5dc'
];

function init() {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
  
  for(let i=0; i<1200; i++) {
    const layer = Math.random();
    bgStars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      size: Math.random() * 0.9 + 0.1,
      alpha: Math.random() * 0.5 + 0.1,
      color: starColors[Math.floor(Math.random() * starColors.length)],
      twinkleSpeed: Math.random() * 0.03 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
      layer: layer,
      baseAlpha: Math.random() * 0.4 + 0.1
    });
  }
  
  const milkyWayCenter = (x) => {
    const t = x / width;
    return height * (0.25 + t * 0.5 + Math.sin(t * Math.PI * 2) * 0.1);
  };
  
  for(let i=0; i<1000; i++) {
    const x = Math.random() * width;
    const centerY = milkyWayCenter(x);
    const spread = 220 + Math.random() * 180;
    const y = centerY + (Math.random() - 0.5) * spread;
    
    const distFromCenter = Math.abs(y - centerY) / (spread/2);
    if(y > 0 && y < height && Math.random() > distFromCenter * 0.7) {
      milkyWayStars.push({
        x: x,
        y: y,
        size: Math.random() * 0.5 + 0.1,
        alpha: (1 - distFromCenter * 0.6) * (Math.random() * 0.3 + 0.15),
        color: Math.random() > 0.6 ? '#a0c4ff' : '#ffffff',
        twinkleSpeed: Math.random() * 0.02 + 0.008
      });
    }
  }
  
  for(let i=0; i<12; i++) {
    distantNebulas.push({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: 200 + Math.random() * 300,
      color: [
        'rgba(60, 40, 100, 0.10)',
        'rgba(40, 60, 120, 0.08)',
        'rgba(80, 40, 60, 0.06)',
        'rgba(40, 80, 100, 0.09)'
      ][Math.floor(Math.random() * 4)]
    });
  }
  
  updateStarCoordinates();
  
  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    updateStarCoordinates();
  });
  
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    checkStarHover();
  });
  
  canvas.addEventListener('mousedown', (e) => {
    if(activeStar) {
      createStarTwinkle(activeStar.visualX, activeStar.visualY, activeStar.color, activeStar.name);
    }
  });

  canvas.addEventListener('dblclick', (e) => {
    e.preventDefault();
    createMeteorShower();
  });
  
  animate();
}

function updateStarCoordinates() {
  const marginX = width * SAFE_MARGIN;
  const marginY = height * SAFE_MARGIN;
  const safeWidth = width * (1 - 2 * SAFE_MARGIN);
  const safeHeight = height * (1 - 2 * SAFE_MARGIN);
  
  constellations.forEach(c => {
    c.stars.forEach(s => {
      s.absX = marginX + s.x * safeWidth;
      s.absY = marginY + s.y * safeHeight;
    });
  });
}

function getConstellationParallax() {
  return {
    x: (mouse.x - width/2) * CONSTELLATION_LAYER * 0.015,
    y: (mouse.y - height/2) * CONSTELLATION_LAYER * 0.015
  };
}

function checkStarHover() {
  let found = null;
  let foundConstellation = null;
  let minDist = 40;
  
  const para = getConstellationParallax();
  
  constellations.forEach(c => {
    c.stars.forEach(s => {
      const visualX = s.absX + para.x;
      const visualY = s.absY + para.y;
      const dist = Math.hypot(mouse.x - visualX, mouse.y - visualY);
      
      if(dist < minDist) {
        found = { ...s, constellation: c.name, visualX, visualY };
        foundConstellation = c;
        minDist = dist;
      }
    });
  });
  
  activeStar = found;
  activeConstellation = foundConstellation;
  updateInfoPanel(found);
  canvas.style.cursor = found ? 'pointer' : 'crosshair';
}

function updateInfoPanel(star) {
  const panel = document.getElementById('info-panel');
  if(star) {
    document.getElementById('info-name').textContent = star.name;
    document.getElementById('info-const').textContent = star.constellation;
    document.getElementById('info-desc').textContent = star.desc;
    panel.classList.add('active');
  } else {
    panel.classList.remove('active');
  }
}

function createStarTwinkle(x, y, color, starName) {
  starTwinkles.push({
    x: x,
    y: y,
    color: color,
    progress: 0,
    duration: 60,
    maxRadius: 40
  });
  
  const text = starWhispers[Math.floor(Math.random() * starWhispers.length)];
  floatingTexts.push({
    x: x + (Math.random() - 0.5) * 40,
    y: y - 30 - Math.random() * 20,
    text: text,
    opacity: 0,
    life: 0,
    maxLife: 120,
    floatOffset: Math.random() * Math.PI * 2
  });
}

function createMeteorShower() {
  for(let i=0; i<20; i++) {
    setTimeout(() => {
      meteors.push({
        x: Math.random() * width,
        y: -50,
        vx: -4 - Math.random() * 2,
        vy: 6 + Math.random() * 3,
        length: 80,
        width: 1.5,
        life: 1,
        color: `hsl(${Math.random()*40 + 190}, 100%, 90%)`
      });
    }, i * 100);
  }
  
  const quote = meteorQuotes[Math.floor(Math.random() * meteorQuotes.length)];
  document.getElementById('shower-quote').textContent = quote;
  const st = document.getElementById('shower-text');
  st.classList.remove('show');
  void st.offsetWidth;
  st.classList.add('show');
}

function drawBackground() {
  const bgGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
  bgGrad.addColorStop(0, '#0a0e1a');
  bgGrad.addColorStop(0.5, '#050810');
  bgGrad.addColorStop(1, '#020408');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, width, height);
  
  distantNebulas.forEach(neb => {
    const grad = ctx.createRadialGradient(neb.x, neb.y, 0, neb.x, neb.y, neb.radius);
    grad.addColorStop(0, neb.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(neb.x, neb.y, neb.radius, 0, Math.PI*2);
    ctx.fill();
  });
  
  ctx.save();
  milkyWayStars.forEach(s => {
    const twinkle = Math.sin(time * s.twinkleSpeed) * 0.3;
    const alpha = Math.max(0, s.alpha + twinkle);
    ctx.fillStyle = s.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
  
  bgStars.forEach(s => {
    const parallaxX = (mouse.x - width/2) * s.layer * 0.015;
    const parallaxY = (mouse.y - height/2) * s.layer * 0.015;
    const x = s.x + parallaxX;
    const y = s.y + parallaxY;
    
    const twinkle = Math.sin(time * s.twinkleSpeed + s.twinklePhase);
    const alpha = s.baseAlpha + twinkle * 0.2;
    
    if(s.layer > 0.7) {
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha * 0.25;
      ctx.beginPath();
      ctx.arc(x, y, s.size * 2.5, 0, Math.PI*2);
      ctx.fill();
    }
    
    ctx.fillStyle = s.layer > 0.5 ? s.color : '#ffffff';
    ctx.globalAlpha = Math.max(0, alpha);
    ctx.beginPath();
    ctx.arc(x, y, s.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// 恢复原始样式的星座绘制
function drawConstellations() {
  const para = getConstellationParallax();
  
  constellations.forEach(c => {
    const isActive = (activeConstellation === c);
    
    c.lines.forEach(pair => {
      const s1 = c.stars[pair[0]];
      const s2 = c.stars[pair[1]];
      if(s1 && s2) {
        const x1 = s1.absX + para.x;
        const y1 = s1.absY + para.y;
        const x2 = s2.absX + para.x;
        const y2 = s2.absY + para.y;
        
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        
        // 恢复原始连线样式
        if(isActive) {
          ctx.strokeStyle = 'rgba(120, 160, 255, 0.5)';
          ctx.lineWidth = 1.5;
          ctx.shadowBlur = 8;
          ctx.shadowColor = 'rgba(100, 149, 237, 0.3)';
        } else {
          ctx.strokeStyle = 'rgba(100, 149, 237, 0.08)';
          ctx.lineWidth = 0.8;
          ctx.shadowBlur = 0;
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    });
    
    c.stars.forEach((s, idx) => {
      const x = s.absX + para.x;
      const y = s.absY + para.y;
      
      const twinkle = starTwinkles.find(t => 
        Math.abs(t.x - x) < 1 && Math.abs(t.y - y) < 1
      );
      
      let currentSize = s.size;
      let brightness = 1;
      let extraGlow = 0;
      
      if(twinkle) {
        const p = twinkle.progress / twinkle.duration;
        brightness = 1 + Math.sin(p * Math.PI) * 2;
        currentSize = s.size * (1 + Math.sin(p * Math.PI) * 0.5);
        extraGlow = Math.sin(p * Math.PI) * 20;
      }
      
      const breathe = 1 + Math.sin(time * 0.002 + idx * 0.5) * 0.05;
      currentSize *= breathe;
      
      const r = parseInt(s.color.slice(1,3), 16);
      const g = parseInt(s.color.slice(3,5), 16);
      const b = parseInt(s.color.slice(5,7), 16);
      
      // 恢复原始光晕透明度
      const haloAlpha = isActive ? 0.5 : 0.2;
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, currentSize * 4);
      gradient.addColorStop(0, `rgba(${Math.min(255, r*brightness)}, ${Math.min(255, g*brightness)}, ${Math.min(255, b*brightness)}, ${haloAlpha})`);
      gradient.addColorStop(1, 'transparent');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, currentSize * 4, 0, Math.PI*2);
      ctx.fill();
      
      if(extraGlow > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${extraGlow/100})`;
        ctx.beginPath();
        ctx.arc(x, y, currentSize * 6, 0, Math.PI*2);
        ctx.fill();
      }
      
      const coreColor = twinkle ? '#ffffff' : s.color;
      // 恢复原始发光强度
      ctx.fillStyle = coreColor;
      ctx.shadowBlur = (isActive ? 12 : 6) + extraGlow;
      ctx.shadowColor = s.color;
      ctx.beginPath();
      ctx.arc(x, y, currentSize * 0.8, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // 恢复原始十字线样式（仅对size>2.2的星星）
      if(s.size > 2.2) {
        ctx.strokeStyle = `rgba(255, 255, 255, ${isActive ? 0.8 : 0.4})`;
        ctx.lineWidth = isActive ? 1.5 : 0.8;
        const len = currentSize * (isActive ? 3 : 2);
        ctx.beginPath();
        ctx.moveTo(x - len, y);
        ctx.lineTo(x + len, y);
        ctx.moveTo(x, y - len);
        ctx.lineTo(x, y + len);
        ctx.stroke();
      }
    });
  });
}

function drawFloatingTexts() {
  floatingTexts = floatingTexts.filter(t => t.life < t.maxLife);
  
  floatingTexts.forEach(t => {
    t.life++;
    const progress = t.life / t.maxLife;
    
    if(progress < 0.2) {
      t.opacity = progress / 0.2;
    } else if(progress > 0.8) {
      t.opacity = (1 - progress) / 0.2;
    } else {
      t.opacity = 1;
    }
    
    const floatY = Math.sin(t.life * 0.05 + t.floatOffset) * 3 - t.life * 0.3;
    const x = t.x;
    const y = t.y + floatY;
    
    ctx.save();
    ctx.globalAlpha = t.opacity;
    ctx.font = 'italic 14px "Noto Serif SC", "SimSun", serif';
    ctx.fillStyle = 'rgba(200, 220, 255, 0.9)';
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(100, 149, 237, 0.5)';
    ctx.textAlign = 'center';
    ctx.fillText(t.text, x, y);
    ctx.restore();
  });
}

function animate() {
  time += 16;
  
  drawBackground();
  drawConstellations();
  
  starTwinkles = starTwinkles.filter(t => {
    t.progress++;
    return t.progress < t.duration;
  });
  
  drawFloatingTexts();
  
  meteors = meteors.filter(m => m.life > 0);
  meteors.forEach(m => {
    m.x += m.vx;
    m.y += m.vy;
    m.life -= 0.008;
    
    ctx.strokeStyle = m.color;
    ctx.lineWidth = m.width;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 8;
    ctx.shadowColor = m.color;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.vx*4, m.y - m.vy*4);
    ctx.stroke();
    ctx.shadowBlur = 0;
  });
  
  requestAnimationFrame(animate);
}
